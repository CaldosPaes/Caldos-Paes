<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caldos Paes Imperial | Pedido Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --verde-escuro: #0a2f1f;
            --dourado: #d4af37;
            --dourado-brilho: #f9e29d;
            --preto-fundo: #051a11;
        }

        body { 
            font-family: 'Georgia', serif; 
            background: var(--preto-fundo); 
            color: var(--dourado); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        header { 
            background: var(--verde-escuro); 
            width: 100%; padding: 20px 0; 
            text-align: center; 
            border-bottom: 3px solid var(--dourado);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .container { width: 90%; max-width: 500px; padding: 20px; }

        .campo-nome { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--dourado-brilho); }
        input[type="text"] { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--dourado);
            background: var(--verde-escuro); color: white; font-size: 16px; box-sizing: border-box;
        }

        .item-caldo { 
            background: var(--verde-escuro); 
            border: 1px solid var(--dourado); 
            padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center;
        }

        .controles { display: flex; align-items: center; gap: 10px; }
        button.qtd { 
            background: var(--dourado); color: var(--verde-escuro); 
            border: none; width: 30px; height: 30px; 
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        .total-container { 
            margin-top: 20px; padding: 20px; 
            background: var(--verde-escuro); border: 2px solid var(--dourado);
            border-radius: 12px; text-align: center;
        }

        .btn-enviar { 
            background: var(--dourado); color: var(--verde-escuro); 
            border: none; width: 100%; padding: 15px; 
            font-size: 18px; font-weight: bold; border-radius: 8px; 
            margin-top: 20px; cursor: pointer; text-transform: uppercase;
        }
        .btn-enviar:hover { background: var(--dourado-brilho); }
    </style>
</head>
<body>

<header>
    <h1>⚜️ Caldos Paes Imperial ⚜️</h1>
</header>

<div class="container">
    <div class="campo-nome">
        <label>SEU NOME:</label>
        <input type="text" id="nome-cliente" placeholder="Quem vai saborear?">
    </div>

    <label>ESCOLHA SEUS CALDOS:</label>
    
    <div class="item-caldo">
        <div>
            <strong>Caldo de Feijão</strong><br>
            <small>R$ 15,00</small>
        </div>
        <div class="controles">
            <button class="qtd" onclick="mudarQtd('feijao', -1)">-</button>
            <span id="qtd-feijao">0</span>
            <button class="qtd" onclick="mudarQtd('feijao', 1)">+</button>
        </div>
    </div>

    <div class="item-caldo">
        <div>
            <strong>Caldo de Mandioca</strong><br>
            <small>R$ 18,00</small>
        </div>
        <div class="controles">
            <button class="qtd" onclick="mudarQtd('mandioca', -1)">-</button>
            <span id="qtd-mandioca">0</span>
            <button class="qtd" onclick="mudarQtd('mandioca', 1)">+</button>
        </div>
    </div>

    <div class="total-container">
        <h3>TOTAL DO PEDIDO</h3>
        <p id="valor-total" style="font-size: 24px; color: var(--dourado-brilho);">R$ 0,00</p>
    </div>

    <button class="btn-enviar" onclick="finalizarPedido()">Enviar Pedido 🚀</button>
</div>

<script>
    // ======= CONFIGURAÇÕES FIREBASE (COLOQUE AS SUAS) =======
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        databaseURL: "https://SEU_PROJETO.firebaseio.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };
    // ========================================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const pedidos = {
        feijao: { nome: "Caldo de Feijão", qtd: 0, preco: 15.00 },
        mandioca: { nome: "Caldo de Mandioca", qtd: 0, preco: 18.00 }
    };

    function mudarQtd(id, delta) {
        pedidos[id].qtd = Math.max(0, pedidos[id].qtd + delta);
        document.getElementById(`qtd-${id}`).innerText = pedidos[id].qtd;
        atualizarTotal();
    }

    function atualizarTotal() {
        let total = 0;
        for (let id in pedidos) {
            total += pedidos[id].qtd * pedidos[id].preco;
        }
        document.getElementById('valor-total').innerText = `R$ ${total.toFixed(2)}`;
    }

    function finalizarPedido() {
        const nome = document.getElementById('nome-cliente').value;
        let resumo = "";
        let totalFinal = 0;

        for (let id in pedidos) {
            if (pedidos[id].qtd > 0) {
                resumo += `${pedidos[id].qtd}x ${pedidos[id].nome}\n`;
                totalFinal += pedidos[id].qtd * pedidos[id].preco;
            }
        }

        if (nome === "") {
            alert("Ei, Imperial! Digite seu nome primeiro.");
            return;
        }

        if (totalFinal === 0) {
            alert("Escolha pelo menos um caldo!");
            return;
        }

        // SALVANDO NO FIREBASE
        database.ref('pedidos').push({
            cliente: nome,
            itens: resumo,
            total: totalFinal,
            data: new Date().toISOString()
        }).then(() => {
            alert("Pedido enviado para a cozinha!");
            // Reseta tudo
            document.getElementById('nome-cliente').value = "";
            for (let id in pedidos) {
                pedidos[id].qtd = 0;
                document.getElementById(`qtd-${id}`).innerText = "0";
            }
            atualizarTotal();
        });
    }
</script>

</body>
</html>
