<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Luxo | Caldos Paes</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --verde-escuro: #0a2f1f;
            --dourado: #d4af37;
            --dourado-brilho: #f9e29d;
            --preto-fundo: #051a11;
        }

        body { 
            font-family: 'Georgia', serif; 
            background: var(--preto-fundo); 
            color: var(--dourado); 
            margin: 0; 
            padding: 0; 
        }

        /* Cabeçalho Luxuoso */
        header { 
            background: var(--verde-escuro); 
            padding: 30px; 
            text-align: center; 
            border-bottom: 3px solid var(--dourado);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        header h1 { 
            margin: 0; 
            font-size: 32px; 
            text-transform: uppercase; 
            letter-spacing: 5px;
            color: var(--dourado-brilho);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .main-container { max-width: 1200px; margin: 30px auto; padding: 20px; }

        /* Cards de Estatísticas */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--verde-escuro); 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid var(--dourado);
            text-align: center; 
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 0 20px var(--dourado); }
        .stat-card h3 { margin: 0; font-size: 16px; color: var(--dourado-brilho); text-transform: uppercase; }
        .stat-card p { margin: 15px 0 0; font-size: 32px; font-weight: bold; }

        /* Controles */
        .controls { 
            background: var(--verde-escuro); 
            padding: 20px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--dourado);
        }
        .controls input[type="month"] { 
            background: #124d34; 
            border: 1px solid var(--dourado); 
            color: var(--dourado-brilho); 
            padding: 10px; 
            border-radius: 5px; 
            outline: none; 
        }

        /* Tabela Dourada */
        .table-container { 
            background: var(--verde-escuro); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid var(--dourado);
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--dourado); color: var(--verde-escuro); }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        tr:hover { background: rgba(212, 175, 55, 0.1); }
        
        /* Botão de Impressão Dourado */
        .btn-print { 
            background: var(--dourado); 
            color: var(--verde-escuro); 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .btn-print:hover { 
            background: var(--dourado-brilho); 
            box-shadow: 0 0 10px var(--dourado);
        }

        /* Área de Impressão */
        @media print {
            body * { visibility: hidden; }
            #cupom-print, #cupom-print * { visibility: visible; }
            #cupom-print { position: absolute; left: 0; top: 0; width: 100%; color: black !important; }
        }
    </style>
</head>
<body>

<header>
    <h1>⚜️ Caldos Paes Imperial ⚜️</h1>
</header>

<div class="main-container">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Faturamento Mensal</h3>
            <p id="total-mes">R$ 0,00</p>
        </div>
        <div class="stat-card">
            <h3>Total de Vendas</h3>
            <p id="vendas-mes">0</p>
        </div>
        <div class="stat-card">
            <h3>Pedidos Hoje</h3>
            <p id="pedidos-hoje">0</p>
        </div>
    </div>

    <div class="controls">
        <strong>SELECIONE O MÊS:</strong>
        <input type="month" id="filtro-mes" onchange="carregarDados()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>HORÁRIO</th>
                    <th>CLIENTE</th>
                    <th>DETALHES DO PEDIDO</th>
                    <th>VALOR TOTAL</th>
                    <th>IMPRIMIR</th>
                </tr>
            </thead>
            <tbody id="lista-pedidos">
                </tbody>
        </table>
    </div>
</div>

<div id="cupom-print" style="display:none; color: black; font-family: monospace;"></div>

<script>
    // ======= CONFIGURAÇÕES DO FIREBASE (SUBSTITUA PELAS SUAS) =======
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_DOMINIO",
        databaseURL: "SUA_URL_DATABASE",
        projectId: "SEU_PROJECT_ID",
        storageBucket: "SEU_BUCKET",
        messagingSenderId: "SEU_SENDER_ID",
        appId: "SEU_APP_ID"
    };
    // ============================================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    document.getElementById('filtro-mes').value = new Date().toISOString().substring(0, 7);

    function carregarDados() {
        const mesFiltro = document.getElementById('filtro-mes').value;
        const hoje = new Date().toDateString();
        
        database.ref('pedidos').on('value', (snapshot) => {
            const lista = document.getElementById('lista-pedidos');
            lista.innerHTML = "";
            let faturamento = 0;
            let totalPedidos = 0;
            let countHoje = 0;

            snapshot.forEach((item) => {
                const p = item.val();
                const dataP = new Date(p.data);
                const mesP = dataP.toISOString().substring(0, 7);

                if (mesP === mesFiltro) {
                    totalPedidos++;
                    faturamento += parseFloat(p.total);
                    if (dataP.toDateString() === hoje) countHoje++;

                    const row = `
                        <tr>
                            <td>${dataP.toLocaleString('pt-BR')}</td>
                            <td><strong>${p.cliente}</strong></td>
                            <td style="font-size: 13px;">${p.itens.replace(/\n/g, '<br>')}</td>
                            <td style="color: var(--dourado-brilho); font-weight: bold;">R$ ${parseFloat(p.total).toFixed(2)}</td>
                            <td><button class="btn-print" onclick="imprimir('${item.key}')">RECIBO</button></td>
                        </tr>
                    `;
                    lista.insertAdjacentHTML('afterbegin', row);
                }
            });

            document.getElementById('total-mes').innerText = `R$ ${faturamento.toFixed(2)}`;
            document.getElementById('vendas-mes').innerText = totalPedidos;
            document.getElementById('pedidos-hoje').innerText = countHoje;
        });
    }

    function imprimir(id) {
        database.ref('pedidos/' + id).once('value', (snap) => {
            const p = snap.val();
            const area = document.getElementById('cupom-print');
            area.style.display = 'block';
            area.innerHTML = `
                <div style="width: 250px; text-align: center; border: 2px solid #000; padding: 15px;">
                    <h2 style="margin:0">CALDOS PAES IMPERIAL</h2>
                    <p>--------------------------------</p>
                    <p><strong>RECIBO DE VENDA</strong></p>
                    <p>${new Date(p.data).toLocaleString()}</p>
                    <p>--------------------------------</p>
                    <div style="text-align: left;">
                        <strong>CLIENTE:</strong> ${p.cliente}<br>
                        <strong>CONTATO:</strong> ${p.telefone}<br><br>
                        <strong>ITENS:</strong><br>
                        ${p.itens.replace(/\n/g, '<br>')}
                    </div>
                    <p>--------------------------------</p>
                    <h3>TOTAL: R$ ${parseFloat(p.total).toFixed(2)}</h3>
                    <p>--------------------------------</p>
                    <p>Atendimento de Excelência</p>
                </div>
            `;
            window.print();
            area.style.display = 'none';
        });
    }

    carregarDados();
</script>

</body>
</html>
