<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Imperial - Caldos Paes</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --verde-escuro: #0a2f1f;
            --dourado: #d4af37;
            --dourado-brilho: #f9e29d;
            --preto-fundo: #051a11;
        }

        body { 
            font-family: 'Georgia', serif; 
            background: var(--preto-fundo); 
            color: var(--dourado); 
            margin: 0; padding: 0; 
        }

        header { 
            background: var(--verde-escuro); 
            padding: 25px; 
            text-align: center; 
            border-bottom: 3px solid var(--dourado);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .main-container { max-width: 1100px; margin: 20px auto; padding: 20px; }

        /* Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--verde-escuro); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--dourado);
            text-align: center; 
        }
        .stat-card p { font-size: 28px; font-weight: bold; margin: 10px 0; color: var(--dourado-brilho); }

        /* Controles */
        .controls { 
            background: var(--verde-escuro); 
            padding: 15px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
            border: 1px solid var(--dourado);
        }
        input[type="month"] { 
            background: #124d34; border: 1px solid var(--dourado); color: white; padding: 8px; border-radius: 5px; 
        }

        /* Tabela */
        .table-container { background: var(--verde-escuro); border-radius: 10px; overflow: hidden; border: 1px solid var(--dourado); }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--dourado); color: var(--verde-escuro); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }

        /* Botões */
        .btn-print { background: var(--dourado); color: var(--verde-escuro); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-fechar { 
            background: #b71c1c; color: white; border: 1px solid var(--dourado); padding: 10px 20px; 
            cursor: pointer; border-radius: 5px; font-weight: bold; display: none; 
        }
        .btn-fechar:hover { background: #ff0000; box-shadow: 0 0 10px red; }

        @media print {
            body * { visibility: hidden; }
            #cupom-print, #cupom-print * { visibility: visible; }
            #cupom-print { position: absolute; left: 0; top: 0; width: 80mm; color: black; background: white; padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <h1>⚜️ Caldos Paes Imperial ⚜️</h1>
</header>

<div class="main-container">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Faturamento Aberto</h3>
            <p id="total-mes">R$ 0,00</p>
        </div>
        <div class="stat-card">
            <h3>Pedidos no Período</h3>
            <p id="pedidos-total">0</p>
        </div>
    </div>

    <div class="controls">
        <div>
            <strong>MÊS: </strong>
            <input type="month" id="filtro-mes" onchange="carregarDados()">
        </div>
        <button id="btn-fechar-mes" class="btn-fechar" onclick="fecharMes()">FECHAR MÊS ATUAL</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>CLIENTE</th>
                    <th>PEDIDO</th>
                    <th>TOTAL</th>
                    <th>AÇÃO</th>
                </tr>
            </thead>
            <tbody id="lista-pedidos"></tbody>
        </table>
    </div>
</div>

<div id="cupom-print" style="display:none; font-family: monospace;"></div>

<script>
    // ======= CONFIGURAÇÕES FIREBASE =======
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        databaseURL: "https://SEU_PROJETO.firebaseio.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };
    // ======================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const inputMes = document.getElementById('filtro-mes');
    inputMes.value = new Date().toISOString().substring(0, 7);

    function carregarDados() {
        const mesFiltro = inputMes.value;
        const mesAtualReal = new Date().toISOString().substring(0, 7);
        const btn = document.getElementById('btn-fechar-mes');

        // Só mostra o botão se for o mês em que estamos
        btn.style.display = (mesFiltro === mesAtualReal) ? "block" : "none";

        database.ref('pedidos').on('value', (snapshot) => {
            const lista = document.getElementById('lista-pedidos');
            lista.innerHTML = "";
            let faturamento = 0;
            let total = 0;

            snapshot.forEach((item) => {
                const p = item.val();
                if(!p.data) return;

                const dataP = new Date(p.data);
                const mesP = dataP.toISOString().substring(0, 7);

                if (mesP === mesFiltro) {
                    // Ignora pedidos que já foram fechados pelo botão
                    if(p.statusFechado) return;

                    faturamento += parseFloat(p.total);
                    total++;

                    const row = `
                        <tr>
                            <td>${dataP.toLocaleDateString()}</td>
                            <td>${p.cliente}</td>
                            <td style="font-size:12px">${p.itens}</td>
                            <td style="color:var(--dourado-brilho)">R$ ${parseFloat(p.total).toFixed(2)}</td>
                            <td><button class="btn-print" onclick="imprimir('${item.key}')">🖨️</button></td>
                        </tr>
                    `;
                    lista.insertAdjacentHTML('afterbegin', row);
                }
            });

            document.getElementById('total-mes').innerText = `R$ ${faturamento.toFixed(2)}`;
            document.getElementById('pedidos-total').innerText = total;
        });
    }

    function fecharMes() {
        if (confirm("Deseja fechar o faturamento? Isso vai zerar o painel para novos pedidos hoje.")) {
            const mesAtual = inputMes.value;
            database.ref('pedidos').once('value', (snapshot) => {
                snapshot.forEach((item) => {
                    const p = item.val();
                    const mesP = new Date(p.data).toISOString().substring(0, 7);
                    if(mesP === mesAtual) {
                        database.ref('pedidos/' + item.key).update({ statusFechado: true });
                    }
                });
                alert("Mês fechado! Ouro no bolso e painel limpo.");
            });
        }
    }

    function imprimir(id) {
        database.ref('pedidos/' + id).once('value', (snap) => {
            const p = snap.val();
            const area = document.getElementById('cupom-print');
            area.style.display = 'block';
            area.innerHTML = `
                <center><h2>CALDOS PAES IMPERIAL</h2>
                --------------------------<br>
                DATA: ${new Date(p.data).toLocaleString()}<br>
                --------------------------</center>
                CLIENTE: ${p.cliente}<br>
                PEDIDO: ${p.itens.replace(/\n/g, '<br>')}<br>
                --------------------------<br>
                <strong>TOTAL: R$ ${parseFloat(p.total).toFixed(2)}</strong>
            `;
            window.print();
            area.style.display = 'none';
        });
    }

    carregarDados();
</script>
</body>
</html>
