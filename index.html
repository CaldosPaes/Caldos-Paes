<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caldos Paes | Experiência Gourmet</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --noite-profunda: #010806;
            --imperial-soft: #041a14;
            --ouro-velho: #b38e5d;
            --ouro-vivido: #f3d9a1;
            --gradiente-luxo: linear-gradient(135deg, #d4af37 0%, #f3d9a1 50%, #b3863a 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --borda-luxo: 1px solid rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--noite-profunda); color: #fff; overflow-x: hidden; }

        #splash {
            position: fixed; inset: 0; background: var(--noite-profunda);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-container { position: relative; width: 120px; height: 120px; border: 2px solid var(--ouro-velho); border-radius: 50%; border-top-color: transparent; animation: spin 2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .logo-text { font-family: 'Cinzel'; font-weight: 900; color: var(--ouro-vivido); font-size: 1.2rem; margin-top: 20px; letter-spacing: 5px; }

        header { 
            height: 40vh; background: linear-gradient(to bottom, rgba(1, 8, 6, 0.4), var(--noite-profunda)), url('https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        header h1 { font-family: 'Cinzel'; font-size: 3rem; color: var(--ouro-vivido); text-shadow: 0 5px 15px rgba(0,0,0,0.8); }

        .container { max-width: 600px; margin: -30px auto 0; padding: 0 20px 120px; position: relative; z-index: 10; }
        .section-tag { font-family: 'Cinzel'; color: var(--ouro-velho); font-size: 0.8rem; margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; font-weight: 700; letter-spacing: 2px; }
        .section-tag::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, rgba(179, 142, 93, 0.4), transparent); }

        .item-card {
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: var(--borda-luxo); border-radius: 15px; padding: 15px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px;
        }
        .item-img { width: 50px; height: 50px; border-radius: 10px; border: 1px solid var(--ouro-velho); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 1.2rem; color: var(--ouro-vivido); background: var(--imperial-soft); flex-shrink: 0; }
        .item-info h3 { font-family: 'Cinzel'; font-size: 1rem; color: #fff; }
        .price-chip { font-weight: 700; font-size: 0.85rem; color: var(--ouro-vivido); margin-top: 4px; display: block; }

        .cart-float {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 400px; height: 60px;
            background: var(--gradiente-luxo); border-radius: 20px;
            display: none; align-items: center; justify-content: space-between;
            padding: 0 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; color: #000; font-weight: 900;
        }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: flex-end; }
        .sheet { width: 100%; background: var(--imperial-soft); border-radius: 30px 30px 0 0; padding: 30px 20px; border-top: 2px solid var(--ouro-velho); max-height: 90vh; overflow-y: auto; }
        .sheet h2 { font-family: 'Cinzel'; color: var(--ouro-vivido); margin-bottom: 20px; text-align: center; font-size: 1.2rem; }

        .pag-box { padding: 15px; border-radius: 12px; border: 1px solid rgba(212,175,55,0.2); text-align: center; margin-bottom: 10px; color: #fff; font-weight: 700; font-size: 0.8rem; }
        .pag-box.active { background: var(--gradiente-luxo); color: #000; border: none; }

        .input-group input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 10px; outline: none; }
        .btn-confirm { width: 100%; background: var(--gradiente-luxo); color: #000; padding: 18px; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; margin-top: 15px; }

        .resumo-card { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin: 15px 0; border: 1px dashed rgba(212,175,55,0.3); font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-container"></div>
    <div class="logo-text">CALDOS PAES</div>
</div>

<header>
    <h1>Caldos Paes</h1>
</header>

<div class="container">
    <div class="section-tag">CALDOS</div>
    <div id="lista-caldos"></div>

    <div class="section-tag">ACOMPANHAMENTOS</div>
    <div id="lista-adicionais"></div>
</div>

<div class="cart-float" id="cart-btn" onclick="abrirCheckout()">
    <span>VER PEDIDO</span>
    <span id="cart-val">R$ 0,00</span>
</div>

<div class="overlay" id="size-overlay">
    <div class="sheet">
        <h2 id="size-title"></h2>
        <div id="size-options"></div>
        <button class="btn-confirm" onclick="confirmarTamanho()">ADICIONAR AO CARRINHO</button>
        <p onclick="fechar()" style="text-align:center; color:var(--ouro-velho); margin-top:20px; font-size:0.8rem;">CANCELAR</p>
    </div>
</div>

<div class="overlay" id="checkout-overlay">
    <div class="sheet">
        <h2>FINALIZAR</h2>
        <div class="input-group"><input type="text" id="end-nome" placeholder="Seu Nome"></div>
        <div style="display:flex; gap:10px;" class="input-group">
            <input type="text" id="end-rua" style="flex:3" placeholder="Rua e Bairro">
            <input type="text" id="end-num" style="flex:1" placeholder="Nº">
        </div>

        <div id="resumo-carrinho" class="resumo-card"></div>

        <p style="font-size:0.7rem; color:var(--ouro-velho); font-weight:700; margin-bottom:10px; letter-spacing:1px;">FORMA DE PAGAMENTO</p>
        <div style="display:flex; gap:10px; margin-bottom: 15px;">
            <div class="pag-box" style="flex:1" onclick="setPag('Pix', this)">PIX</div>
            <div class="pag-box" style="flex:1" onclick="setPag('Dinheiro', this)">DINHEIRO</div>
        </div>

        <div id="secao-troco" style="display:none; margin-bottom: 15px;">
            <p style="font-size:0.7rem; color:var(--ouro-velho); font-weight:700; margin-bottom:10px;">PRECISA DE TROCO?</p>
            <div style="display:flex; gap:10px; margin-bottom: 10px;">
                <div class="pag-box" style="flex:1; padding: 10px;" onclick="toggleTroco(true, this)">SIM</div>
                <div class="pag-box" style="flex:1; padding: 10px;" onclick="toggleTroco(false, this)">NÃO</div>
            </div>
            <div id="campo-valor-troco" style="display:none;" class="input-group">
                <input type="number" id="valor-troco" placeholder="Troco para quanto?">
            </div>
        </div>

        <button class="btn-confirm" onclick="enviarWhatsApp()">ENVIAR PELO WHATSAPP</button>
        <p onclick="fechar()" style="text-align:center; color:var(--ouro-velho); margin-top:20px; font-size:0.8rem;">VOLTAR AO MENU</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPvJJ9_O8GgLx3f7bCdbNfhzwuNwFBCuw",
        authDomain: "caldos-paes.firebaseapp.com",
        projectId: "caldos-paes",
        storageBucket: "caldos-paes.firebasestorage.app",
        messagingSenderId: "926863375495",
        appId: "1:926863375495:web:635a5b8986b986deeb4c22"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const caldos = [
        { id: 1, letra: "C", nome: "Caldo Cuiabano", p350: 18, p500: 25 },
        { id: 2, letra: "M", nome: "Caldo de Milho", p350: 18, p500: 25 },
        { id: 3, letra: "F", nome: "Caldo de Feijão", p350: 18, p500: 25 }
    ];

    const acompanhamentos = [
        { id: 101, letra: "V", nome: "Cheiro Verde", preco: 0 },
        { id: 102, letra: "T", nome: "Torrada (6 un)", preco: 3 },
        { id: 103, letra: "O", nome: "Ovo de Codorna (3 un)", preco: 5 }
    ];

    let cart = [];
    let pagSel = '';
    let itemTemp = null;
    let tSel = null;
    let precisaTroco = false;

    const render = (data, target, isCaldo) => {
        document.getElementById(target).innerHTML = data.map(i => `
            <div class="item-card" onclick="${isCaldo ? `openSize(${i.id})` : `addAoCarrinho('${i.nome}', ${i.preco})`}">
                <div class="item-img">${i.letra}</div>
                <div class="item-info">
                    <h3>${i.nome}</h3>
                    <span class="price-chip">R$ ${isCaldo ? i.p350 + ' / ' + i.p500 : i.preco + ',00'}</span>
                </div>
            </div>
        `).join('');
    };

    render(caldos, 'lista-caldos', true);
    render(acompanhamentos, 'lista-adicionais', false);

    function openSize(id) {
        itemTemp = caldos.find(x => x.id === id);
        document.getElementById('size-title').innerText = itemTemp.nome;
        document.getElementById('size-options').innerHTML = `
            <div class="pag-box" onclick="setT(${itemTemp.p350}, '350ml', this)">350ml - R$ ${itemTemp.p350},00</div>
            <div class="pag-box" onclick="setT(${itemTemp.p500}, '500ml', this)">500ml - R$ ${itemTemp.p500},00</div>
        `;
        document.getElementById('size-overlay').style.display = 'flex';
    }

    function setT(p, tam, el) {
        tSel = { p, tam };
        document.querySelectorAll('#size-options .pag-box').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }

    function confirmarTamanho() {
        if(!tSel) return alert("Selecione um tamanho!");
        addAoCarrinho(`${itemTemp.nome} (${tSel.tam})`, tSel.p);
        fechar();
    }

    function addAoCarrinho(nome, preco) {
        const ex = cart.find(x => x.n === nome);
        if(ex) ex.q++; else cart.push({ n: nome, p: preco, q: 1 });
        atualizarTotal();
    }

    function atualizarTotal() {
        const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
        document.getElementById('cart-btn').style.display = cart.length > 0 ? 'flex' : 'none';
        document.getElementById('cart-val').innerText = `R$ ${(sub + 7).toFixed(2)}`;
    }

    function abrirCheckout() {
        const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
        document.getElementById('resumo-carrinho').innerHTML = cart.map(i => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.q}x ${i.n}</span><b>R$ ${(i.p*i.q).toFixed(2)}</b></div>
        `).join('') + `
            <div style="display:flex; justify-content:space-between; margin-top:10px; color:var(--ouro-velho)"><span>Taxa Entrega</span><b>R$ 7,00</b></div>
            <div style="margin-top:10px; padding-top:10px; border-top:1px solid #444; font-weight:900; color:var(--ouro-vivido); display:flex; justify-content:space-between; font-size:1rem;"><span>TOTAL</span><span>R$ ${(sub+7).toFixed(2)}</span></div>
        `;
        document.getElementById('checkout-overlay').style.display = 'flex';
    }

    function setPag(p, el) {
        pagSel = p;
        document.querySelectorAll('.pag-box').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        const secaoTroco = document.getElementById('secao-troco');
        if (p === 'Dinheiro') { secaoTroco.style.display = 'block'; } 
        else { secaoTroco.style.display = 'none'; document.getElementById('campo-valor-troco').style.display = 'none'; precisaTroco = false; }
    }

    function toggleTroco(sim, el) {
        precisaTroco = sim;
        el.parentNode.querySelectorAll('.pag-box').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('campo-valor-troco').style.display = sim ? 'block' : 'none';
    }

    function fechar() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); tSel = null; }

    async function enviarWhatsApp() {
        const nome = document.getElementById('end-nome').value;
        const rua = document.getElementById('end-rua').value;
        const trocoValor = document.getElementById('valor-troco').value;
        if(!nome || !rua || !pagSel) return alert("Preencha todos os campos!");
        if(precisaTroco && !trocoValor) return alert("Informe o valor para o troco!");

        const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
        const total = (sub + 7).toFixed(2);
        const itensTxt = cart.map(i => `${i.q}x ${i.n}`).join(', ');
        let infoTroco = precisaTroco ? `Troco para R$ ${trocoValor}` : "Não precisa";

        await db.collection("pedidos").add({
            cliente: nome, itens: itensTxt, total: total, pagamento: pagSel, troco: infoTroco, status: 'Pendente',
            endereco: { rua: rua, num: document.getElementById('end-num').value }, data: new Date().toLocaleString('pt-BR')
        });

        const msg = `*CALDOS PAES*\n\n*Cliente:* ${nome}\n*Pedido:* ${itensTxt}\n*Total:* R$ ${total}\n*Pagamento:* ${pagSel}\n*Troco:* ${infoTroco}\n*Endereço:* ${rua}, ${document.getElementById('end-num').value}`;
        window.open(`https://wa.me/5566992168397?text=${encodeURIComponent(msg)}`);
    }

    setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').remove(), 1000); }, 2000);
</script>
</body>
</html>
