<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caldos Paes | Experiência Gourmet</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --noite-profunda: #010806;
            --imperial-soft: #041a14;
            --ouro-velho: #b38e5d;
            --ouro-vivido: #f3d9a1;
            --gradiente-luxo: linear-gradient(135deg, #d4af37 0%, #f3d9a1 50%, #b3863a 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --borda-luxo: 1px solid rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--noite-profunda); color: #fff; overflow-x: hidden; }

        /* Splash Screen de Elite */
        #splash {
            position: fixed; inset: 0; background: var(--noite-profunda);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-container { position: relative; width: 150px; height: 150px; }
        .logo-circle {
            position: absolute; inset: 0; border: 2px solid var(--ouro-velho);
            border-radius: 50%; border-top-color: transparent;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .logo-text { font-family: 'Cinzel'; font-weight: 900; color: var(--ouro-vivido); font-size: 1.2rem; margin-top: 20px; letter-spacing: 5px; opacity: 0; animation: fadeIn 1.5s forwards 0.5s; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Header Cinematográfico */
        header { 
            height: 60vh; background: linear-gradient(to bottom, rgba(1, 8, 6, 0.2), var(--noite-profunda)), url('https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            padding: 20px;
        }
        header h1 { font-family: 'Cinzel'; font-size: 3.5rem; color: var(--ouro-vivido); text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        header p { font-size: 0.7rem; letter-spacing: 6px; color: var(--ouro-velho); text-transform: uppercase; margin-top: 10px; font-weight: 700; }

        /* Menu Minimalista e Chic */
        .container { max-width: 800px; margin: -50px auto 0; padding: 0 20px 120px; position: relative; z-index: 10; }
        
        .section-tag { font-family: 'Cinzel'; color: var(--ouro-velho); font-size: 0.9rem; margin: 40px 0 20px; display: flex; align-items: center; gap: 15px; font-weight: 700; }
        .section-tag::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, rgba(179, 142, 93, 0.5), transparent); }

        .item-card {
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: var(--borda-luxo); border-radius: 20px; padding: 20px; margin-bottom: 25px;
            display: flex; align-items: center; gap: 20px; transition: transform 0.3s;
        }
        .item-card:active { transform: scale(0.98); background: rgba(212, 175, 55, 0.05); }

        .item-img { width: 80px; height: 80px; border-radius: 15px; border: 1px solid var(--ouro-velho); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 2rem; color: var(--ouro-vivido); background: var(--imperial-soft); flex-shrink: 0; }
        
        .item-info { flex: 1; }
        .item-info h3 { font-family: 'Cinzel'; font-size: 1.2rem; color: #fff; margin-bottom: 5px; }
        .item-info p { font-size: 0.8rem; color: #a0a0a0; line-height: 1.4; margin-bottom: 15px; font-weight: 300; }
        
        .price-chip { 
            display: inline-block; padding: 6px 15px; border-radius: 50px;
            background: var(--gradiente-luxo); color: #000; font-weight: 700; font-size: 0.8rem;
        }

        /* Float Carrinho Estilo Apple */
        .cart-float {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 400px; height: 70px;
            background: var(--ouro-vivido); border-radius: 25px;
            display: none; align-items: center; justify-content: space-between;
            padding: 0 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 1000; cursor: pointer; color: #000; font-weight: 900;
        }

        /* Sheets (Checkout) */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: flex-end; }
        .sheet {
            width: 100%; background: var(--imperial-soft); border-radius: 40px 40px 0 0;
            padding: 40px 25px; max-height: 90vh; overflow-y: auto; border-top: 2px solid var(--ouro-velho);
        }
        .sheet h2 { font-family: 'Cinzel'; color: var(--ouro-vivido); margin-bottom: 30px; text-align: center; }

        .input-group { margin-bottom: 15px; }
        .input-group input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2);
            padding: 18px; border-radius: 15px; color: #fff; font-size: 1rem; outline: none;
        }
        .input-group input:focus { border-color: var(--ouro-vivido); }

        .btn-confirm {
            width: 100%; background: var(--gradiente-luxo); color: #000;
            padding: 22px; border: none; border-radius: 20px; font-weight: 900;
            font-size: 1rem; text-transform: uppercase; margin-top: 20px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        /* Resumo Luxo */
        .resumo-card { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px dashed rgba(212,175,55,0.3); }
        .linha-resumo { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .linha-total { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(212,175,55,0.2); font-weight: 900; color: var(--ouro-vivido); font-size: 1.2rem; }

        .metodo-pag { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;
        }
        .pag-box { 
            padding: 15px; border-radius: 12px; border: 1px solid rgba(212,175,55,0.2); text-align: center;
            font-size: 0.8rem; font-weight: 700; color: var(--ouro-velho);
        }
        .pag-box.active { background: var(--gradiente-luxo); color: #000; border: none; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-container">
        <div class="logo-circle"></div>
    </div>
    <div class="logo-text">CALDOS PAES</div>
</div>

<header>
    <h1>Caldos Paes</h1>
    <p>A Realeza do Sabor</p>
</header>

<div class="container">
    <div class="section-tag">NOSSAS ESPECIALIDADES</div>
    <div id="lista-caldos"></div>

    <div class="section-tag">GUARNIÇÕES E EXTRAS</div>
    <div id="lista-adicionais"></div>
</div>

<div class="cart-float" id="cart-btn" onclick="abrirCheckout()">
    <span>VISUALIZAR PEDIDO</span>
    <span id="cart-val">R$ 0,00</span>
</div>

<div class="overlay" id="size-overlay">
    <div class="sheet">
        <h2 id="size-title"></h2>
        <div id="size-options"></div>
        <button class="btn-confirm" onclick="confirmarTamanho()">ADICIONAR À MESA</button>
        <p onclick="fechar()" style="text-align:center; color:var(--ouro-velho); margin-top:25px; font-size:0.8rem; letter-spacing:2px;">CANCELAR</p>
    </div>
</div>

<div class="overlay" id="checkout-overlay">
    <div class="sheet">
        <h2>Checkout Imperial</h2>
        <div class="input-group"><input type="text" id="end-nome" placeholder="Seu Nome"></div>
        <div style="display:flex; gap:10px;" class="input-group">
            <input type="text" id="end-rua" style="flex:3" placeholder="Endereço">
            <input type="text" id="end-num" style="flex:1" placeholder="Nº">
        </div>
        <div class="input-group"><input type="text" id="end-bairro" placeholder="Bairro"></div>

        <div id="resumo-carrinho" class="resumo-card"></div>

        <p style="font-size:0.7rem; color:var(--ouro-velho); font-weight:700; margin-bottom:10px;">FORMA DE PAGAMENTO</p>
        <div class="metodo-pag">
            <div class="pag-box" onclick="setPag('Pix', this)">PIX</div>
            <div class="pag-box" onclick="setPag('Dinheiro', this)">DINHEIRO</div>
        </div>

        <button class="btn-confirm" onclick="enviarWhatsApp()">FINALIZAR PEDIDO</button>
        <p onclick="fechar()" style="text-align:center; color:var(--ouro-velho); margin-top:25px; font-size:0.8rem;">VOLTAR AO MENU</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPvJJ9_O8GgLx3f7bCdbNfhzwuNwFBCuw",
        authDomain: "caldos-paes.firebaseapp.com",
        projectId: "caldos-paes",
        storageBucket: "caldos-paes.firebasestorage.app",
        messagingSenderId: "926863375495",
        appId: "1:926863375495:web:635a5b8986b986deeb4c22"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const caldos = [
        { id: 1, letra: "C", nome: "Caldo Cuiabano", p350: 17.99, p500: 24.99, d: "Moda Da Casa." },
        { id: 2, letra: "M", nome: "Caldo de Milho", p350: 17.99, p500: 24.99, d: "Milho Cremoso." },
        { id: 3, letra: "F", nome: "Caldo de Feijão", p350: 17.99, p500: 24.99, d: "Saboroso." }
    ];

    const acompanhamentos = [
        { id: 101, letra: "V", nome: "Cheiro Verde", preco: 0, d: "Ervas frescas colhidas hoje." },
        { id: 102, letra: "T", nome: "Torrada", preco: 3, d: "6 unidades torradas." },
        { id: 103, letra: "O", nome: "Ovo de Codorna", preco: 5, d: "3 Unidades de felicidade." }
    ];
    let cart = [];
    let pagSel = '';
    let itemTemp = null;
    let tSel = null;

    // Renderizar
    const render = (data, target, isCaldo) => {
        document.getElementById(target).innerHTML = data.map(i => `
            <div class="item-card" onclick="${isCaldo ? `openSize(${i.id})` : `addAoCarrinho('${i.nome}', ${i.preco})`}">
                <div class="item-img">${i.letra}</div>
                <div class="item-info">
                    <h3>${i.nome}</h3>
                    <p>${i.d}</p>
                    <div class="price-chip">R$ ${isCaldo ? i.p350 : i.preco},00</div>
                </div>
            </div>
        `).join('');
    };

    render(caldos, 'lista-caldos', true);
    render(acompanhamentos, 'lista-adicionais', false);

    function openSize(id) {
        itemTemp = caldos.find(x => x.id === id);
        document.getElementById('size-title').innerText = itemTemp.nome;
        document.getElementById('size-options').innerHTML = `
            <div class="pag-box" style="margin-bottom:10px" onclick="setT(${itemTemp.p350}, '350ml', this)">350ml - R$ ${itemTemp.p350},00</div>
            <div class="pag-box" onclick="setT(${itemTemp.p500}, '500ml', this)">500ml - R$ ${itemTemp.p500},00</div>
        `;
        document.getElementById('size-overlay').style.display = 'flex';
    }

    function setT(p, tam, el) {
        tSel = { p, tam };
        document.querySelectorAll('#size-options .pag-box').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }

    function confirmarTamanho() {
        if(!tSel) return;
        addAoCarrinho(`${itemTemp.nome} (${tSel.tam})`, tSel.p);
        fechar();
    }

    function addAoCarrinho(nome, preco) {
        const ex = cart.find(x => x.n === nome);
        if(ex) ex.q++; else cart.push({ n: nome, p: preco, q: 1 });
        atualizarTotal();
    }

    function atualizarTotal() {
        const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
        document.getElementById('cart-btn').style.display = cart.length > 0 ? 'flex' : 'none';
        document.getElementById('cart-val').innerText = `R$ ${(sub + 7).toFixed(2)}`;
    }

    function abrirCheckout() {
        const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
        document.getElementById('resumo-carrinho').innerHTML = cart.map(i => `
            <div class="linha-resumo"><span>${i.q}x ${i.n}</span><b>R$ ${(i.p*i.q).toFixed(2)}</b></div>
        `).join('') + `
            <div class="linha-resumo" style="color:var(--ouro-velho)"><span>Taxa de Entrega</span><b>R$ 7,00</b></div>
            <div class="linha-total"><span>TOTAL</span><span>R$ ${(sub+7).toFixed(2)}</span></div>
        `;
        document.getElementById('checkout-overlay').style.display = 'flex';
    }

    function setPag(p, el) {
        pagSel = p;
        document.querySelectorAll('.pag-box').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }

    function fechar() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); tSel = null; }

    async function enviarWhatsApp() {
        const nome = document.getElementById('end-nome').value;
        const rua = document.getElementById('end-rua').value;
        if(!nome || !rua || !pagSel) return alert("Por favor, preencha todos os campos.");

        const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
        const total = (sub + 7).toFixed(2);
        const dataH = new Date().toLocaleString('pt-BR');

        await db.collection("pedidos").add({
            cliente: nome,
            itens: cart.map(i => `${i.q}x ${i.n}`).join(', '),
            total: total,
            pagamento: pagSel,
            status: 'Pendente',
            endereco: { rua: rua, numero: document.getElementById('end-num').value, bairro: document.getElementById('end-bairro').value },
            data: dataH
        });

        const msg = `*NOVO PEDIDO - CALDOS PAES*\n\n*Cliente:* ${nome}\n*Pedido:* ${cart.map(i => `${i.q}x ${i.n}`).join(', ')}\n\n*Total:* R$ ${total}\n*Pagamento:* ${pagSel}`;
        window.open(`https://wa.me/5566992168397?text=${encodeURIComponent(msg)}`);
    }

    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').remove(), 1000);
    }, 2500);
</script>
</body>
</html>
