<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Administrativo | Caldos Paes</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-noite: #010d0a;
            --v-imperial: #04241c;
            --ouro: #d4af37;
            --ouro-brilho: #f3d9a1;
            --sucesso: #2ecc71;
            --alerta: #f1c40f;
            --perigo: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--v-noite); color: #fff; padding-bottom: 50px; }

        /* HEADER PROFISSIONAL */
        .top-bar {
            background: var(--v-imperial); border-bottom: 2px solid var(--ouro);
            padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100;
        }
        .top-bar h1 { font-family: 'Cinzel'; color: var(--ouro-brilho); font-size: 1.5rem; letter-spacing: 2px; }

        /* DASHBOARD DE RELATÓRIO */
        .dashboard {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px;
        }
        .stat-card {
            background: linear-gradient(145deg, #053025, #021a14);
            border: 1px solid rgba(212, 175, 55, 0.3); padding: 15px; border-radius: 12px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .stat-card span { font-size: 0.7rem; color: var(--ouro); font-weight: 900; text-transform: uppercase; }
        .stat-card div { font-size: 1.2rem; font-weight: 900; margin-top: 5px; color: #fff; }

        /* FILA DE PEDIDOS */
        .order-list { padding: 15px; }
        .order-card {
            background: var(--v-imperial); border-left: 5px solid var(--ouro);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
            position: relative; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .order-card.pendente { border-left-color: var(--alerta); box-shadow: 0 0 15px rgba(241, 196, 15, 0.1); }
        .order-card.preparando { border-left-color: #3498db; }
        .order-card.entregue { border-left-color: var(--sucesso); opacity: 0.8; }

        .badge {
            position: absolute; top: 15px; right: 15px; font-size: 0.6rem;
            padding: 4px 8px; border-radius: 4px; font-weight: 900;
        }

        .client-info b { color: var(--ouro-brilho); font-size: 1.1rem; }
        .order-details { font-size: 0.9rem; margin: 15px 0; color: #cbd5d3; line-height: 1.5; }
        
        .address-box {
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px;
            font-size: 0.85rem; border: 1px dashed rgba(212, 175, 55, 0.2);
        }

        /* BOTÕES DE AÇÃO */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn {
            padding: 12px; border: none; border-radius: 6px; font-weight: 900;
            font-size: 0.7rem; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-main { background: var(--ouro-brilho); color: #000; grid-column: span 2; }
        .btn-wa { background: #25d366; color: #fff; }
        .btn-cancel { background: rgba(231, 76, 60, 0.2); color: var(--perigo); border: 1px solid var(--perigo); }

        .btn-reset-mes {
            background: transparent; border: 1px solid var(--perigo); color: var(--perigo);
            margin: 20px; width: calc(100% - 40px); padding: 10px; font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>CALDOS PAES ADMIN</h1>
    </div>

    <div class="dashboard">
        <div class="stat-card">
            <span>Vendas (Bruto)</span>
            <div id="bruto">R$ 0,00</div>
        </div>
        <div class="stat-card">
            <span>Mês Atual</span>
            <div id="mes-nome">---</div>
        </div>
        <div class="stat-card" style="grid-column: span 2;">
            <span>Volume de Pedidos</span>
            <div id="qtd-total">0 pedidos</div>
        </div>
    </div>

    <div class="order-list" id="lista-pedidos">
        </div>

    <button class="btn-reset-mes" onclick="fecharMes()">ENCERRAR MÊS ATUAL</button>

    <audio id="notificacao-som" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPvJJ9_O8GgLx3f7bCdbNfhzwuNwFBCuw",
        authDomain: "caldos-paes.firebaseapp.com",
        projectId: "caldos-paes",
        storageBucket: "caldos-paes.firebasestorage.app",
        messagingSenderId: "926863375495",
        appId: "1:926863375495:web:635a5b8986b986deeb4c22"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let ultimoPedidoId = null;

    // Nomes dos meses
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    document.getElementById('mes-nome').innerText = meses[new Date().getMonth()];

    // ESCUTA EM TEMPO REAL
    db.collection("pedidos").orderBy("data", "desc").onSnapshot((snapshot) => {
        const list = document.getElementById('lista-pedidos');
        let totalBruto = 0;
        let qtd = 0;
        
        // Alerta sonoro para novo pedido
        if (ultimoPedidoId && snapshot.docs[0] && snapshot.docs[0].id !== ultimoPedidoId) {
            document.getElementById('notificacao-som').play().catch(e => console.log("Som bloqueado pelo navegador"));
        }
        if (snapshot.docs[0]) ultimoPedidoId = snapshot.docs[0].id;

        list.innerHTML = "";

        snapshot.forEach((doc) => {
            const p = doc.data();
            const id = doc.id;
            const valor = parseFloat(p.total.replace(',', '.'));
            totalBruto += valor;
            qtd++;

            const status = p.status || 'Pendente';
            const statusClass = status.toLowerCase().replace(' ', '');

            let botaoFluxo = '';
            if(status === 'Pendente') {
                botaoFluxo = `<button class="btn btn-main" onclick="atualizar('${id}', 'Preparando')">👨‍🍳 INICIAR PREPARO</button>`;
            } else if(status === 'Preparando') {
                botaoFluxo = `<button class="btn btn-main" style="background:var(--sucesso)" onclick="atualizar('${id}', 'A Caminho')">🛵 SAIU PARA ENTREGA</button>`;
            }

            list.innerHTML += `
                <div class="order-card ${statusClass}">
                    <div class="badge ${statusClass}">${status}</div>
                    <div class="client-info">
                        <b>${p.cliente}</b><br>
                        <small style="color:#888">${p.data}</small>
                    </div>
                    
                    <div class="order-details">
                        ${p.itens.split(',').map(i => `• ${i.trim()}<br>`).join('')}
                    </div>

                    <div class="address-box">
                        📍 ${p.endereco.rua}, ${p.endereco.num || p.endereco.numero} - ${p.endereco.bairro}<br>
                        <small>💳 Pagamento: ${p.pagamento} ${p.troco ? `(Troco: ${p.troco})` : ''}</small>
                    </div>

                    <div style="margin-top:15px; font-weight:900; color:var(--ouro-brilho); font-size:1.2rem;">
                        R$ ${p.total}
                    </div>

                    <div class="actions">
                        ${botaoFluxo}
                        <button class="btn btn-wa" onclick="contatar('${p.cliente}', '${p.total}')">WHATSAPP</button>
                        <button class="btn btn-cancel" onclick="cancelar('${id}')">CANCELAR</button>
                    </div>
                </div>
            `;
        });

        document.getElementById('bruto').innerText = `R$ ${totalBruto.toFixed(2).replace('.', ',')}`;
        document.getElementById('qtd-total').innerText = `${qtd} pedidos`;
    });

    async function atualizar(id, st) {
        await db.collection("pedidos").doc(id).update({ status: st });
    }

    async function cancelar(id) {
        if(confirm("Deseja cancelar e excluir este pedido?")) {
            await db.collection("pedidos").doc(id).delete();
        }
    }

    function contatar(nome, total) {
        window.open(`https://wa.me/?text=Olá ${nome}, aqui é do Caldos Paes! Recebemos seu pedido de R$ ${total}.`);
    }

    async function fecharMes() {
        if(confirm("⚠️ ATENÇÃO: Deseja realmente fechar o mês? Todos os pedidos serão apagados para iniciar o relatório do zero!")) {
            const b = db.batch();
            const s = await db.collection("pedidos").get();
            s.forEach(d => b.delete(d.ref));
            await b.commit();
            alert("Mês encerrado com sucesso!");
        }
    }
</script>
</body>
</html>
